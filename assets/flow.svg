<svg viewBox="0 0 1240 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title>byline-skill flow</title>
  <desc>Your profile/ files feed an eight-phase loop (Load, Research, Interview, Draft, Cite, Review, Publish, Write back). A red line runs through it: every opinion traces to an answer you confirmed. Output is a finished draft, optionally published; each piece is written back so the work compounds.</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9CA3AF"/></marker>
    <marker id="ahi" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6366F1"/></marker>
  </defs>

  <rect x="4" y="4" width="1232" height="592" rx="20" fill="#FAFAFB" stroke="#E5E7EB" stroke-width="2"/>

  <!-- header -->
  <text x="60" y="48" font-size="14" font-weight="700" fill="#6366F1" letter-spacing="3">BYLINE-SKILL</text>
  <text x="60" y="80" font-size="23" font-weight="700" fill="#111827">Interview-first ghostwriting, as a loop</text>
  <text x="60" y="102" font-size="13.5" fill="#6B7280">AI asks · you answer · AI drafts. Every opinion in the piece is one you confirmed.</text>

  <!-- lane 1: profile inputs -->
  <rect x="60" y="118" width="1120" height="66" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="80" y="146" font-size="13.5" font-weight="700" fill="#4338CA">profile/</text>
  <text x="80" y="165" font-size="10.5" fill="#6366F1">yours · git-tracked</text>
  <g font-size="12.5" fill="#3730A3" text-anchor="middle">
    <rect x="260" y="134" width="200" height="34" rx="8" fill="#FFFFFF" stroke="#C7D2FE"/><text x="360" y="156">author.md</text>
    <rect x="493" y="134" width="200" height="34" rx="8" fill="#FFFFFF" stroke="#C7D2FE"/><text x="593" y="156">voice.md</text>
    <rect x="726" y="134" width="200" height="34" rx="8" fill="#FFFFFF" stroke="#C7D2FE"/><text x="826" y="156">work.md</text>
    <rect x="959" y="134" width="200" height="34" rx="8" fill="#FFFFFF" stroke="#C7D2FE"/><text x="1059" y="156">publish.md · optional</text>
  </g>

  <!-- profile -> loop -->
  <line x1="120" y1="184" x2="120" y2="212" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ah)"/>
  <text x="60" y="208" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">THE LOOP</text>

  <!-- lane 2: phases -->
  <g>
    <!-- chips: 0..7 at x = 60 + i*140 -->
    <!-- 0 Load --><rect x="60" y="216" width="120" height="88" rx="11" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- 1 Research --><rect x="200" y="216" width="120" height="88" rx="11" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- 2 Interview --><rect x="340" y="216" width="120" height="88" rx="11" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.6"/>
    <!-- 3 Draft --><rect x="480" y="216" width="120" height="88" rx="11" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- 4 Cite --><rect x="620" y="216" width="120" height="88" rx="11" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- 5 Review --><rect x="760" y="216" width="120" height="88" rx="11" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.6"/>
    <!-- 6 Publish --><rect x="900" y="216" width="120" height="88" rx="11" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- 7 Write back --><rect x="1040" y="216" width="120" height="88" rx="11" fill="#FFFFFF" stroke="#E5E7EB"/>

    <!-- badges -->
    <g text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">
      <circle cx="120" cy="240" r="12" fill="#6366F1"/><text x="120" y="244">0</text>
      <circle cx="260" cy="240" r="12" fill="#6366F1"/><text x="260" y="244">1</text>
      <circle cx="400" cy="240" r="12" fill="#F59E0B"/><text x="400" y="244">2</text>
      <circle cx="540" cy="240" r="12" fill="#6366F1"/><text x="540" y="244">3</text>
      <circle cx="680" cy="240" r="12" fill="#6366F1"/><text x="680" y="244">4</text>
      <circle cx="820" cy="240" r="12" fill="#DC2626"/><text x="820" y="244">5</text>
      <circle cx="960" cy="240" r="12" fill="#6366F1"/><text x="960" y="244">6</text>
      <circle cx="1100" cy="240" r="12" fill="#6366F1"/><text x="1100" y="244">7</text>
    </g>

    <!-- names -->
    <g text-anchor="middle" font-size="13.5" font-weight="600" fill="#111827">
      <text x="120" y="276">Load</text>
      <text x="260" y="276">Research</text>
      <text x="400" y="276" fill="#B45309">Interview</text>
      <text x="540" y="276">Draft</text>
      <text x="680" y="276">Cite</text>
      <text x="820" y="276" fill="#B91C1C">Review</text>
      <text x="960" y="276">Publish</text>
      <text x="1100" y="276">Write back</text>
    </g>
    <!-- subtitles -->
    <g text-anchor="middle" font-size="9" fill="#9CA3AF">
      <text x="120" y="292">read profile/</text>
      <text x="260" y="292">do homework</text>
      <text x="400" y="292" fill="#B45309">you ⇄ AI, 3-5 Q</text>
      <text x="540" y="292">in your voice</text>
      <text x="680" y="292">two tiers</text>
      <text x="820" y="292" fill="#B91C1C">red-line check</text>
      <text x="960" y="292">optional</text>
      <text x="1100" y="292">to work.md</text>
    </g>

    <!-- arrows between chips -->
    <g stroke="#9CA3AF" stroke-width="2">
      <line x1="180" y1="260" x2="198" y2="260" marker-end="url(#ah)"/>
      <line x1="320" y1="260" x2="338" y2="260" marker-end="url(#ah)"/>
      <line x1="460" y1="260" x2="478" y2="260" marker-end="url(#ah)"/>
      <line x1="600" y1="260" x2="618" y2="260" marker-end="url(#ah)"/>
      <line x1="740" y1="260" x2="758" y2="260" marker-end="url(#ah)"/>
      <line x1="880" y1="260" x2="898" y2="260" marker-end="url(#ah)"/>
      <line x1="1020" y1="260" x2="1038" y2="260" marker-end="url(#ah)"/>
    </g>
  </g>

  <!-- red line band -->
  <rect x="60" y="322" width="1120" height="40" rx="10" fill="#FEF2F2" stroke="#FECACA"/>
  <text x="82" y="347" font-size="13"><tspan fill="#B91C1C" font-weight="700">The red line   </tspan><tspan fill="#7F1D1D">every opinion traces to an answer you confirmed. Conversation ≠ confirmation.</tspan></text>

  <!-- loop -> output (passes the gate) -->
  <line x1="1100" y1="304" x2="1100" y2="392" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ah)"/>

  <!-- lane 3: output -->
  <text x="60" y="384" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">OUTPUT</text>
  <g text-anchor="middle">
    <rect x="60" y="392" width="250" height="66" rx="11" fill="#F0FDFA" stroke="#99F6E4"/>
    <text x="185" y="422" font-size="13.5" font-weight="600" fill="#0F766E">drafts/&lt;slug&gt;.md</text>
    <text x="185" y="441" font-size="10" fill="#0D9488">finished Markdown</text>

    <rect x="370" y="392" width="300" height="66" rx="11" fill="#F0FDFA" stroke="#99F6E4"/>
    <text x="520" y="422" font-size="13.5" font-weight="600" fill="#0F766E">publish · optional</text>
    <text x="520" y="441" font-size="10" fill="#0D9488">writes the file, never runs git</text>

    <rect x="730" y="392" width="230" height="66" rx="11" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="845" y="422" font-size="13.5" font-weight="600" fill="#111827">your blog / repo</text>
    <text x="845" y="441" font-size="10" fill="#9CA3AF">you review and ship</text>
  </g>
  <g stroke="#9CA3AF" stroke-width="2">
    <line x1="310" y1="425" x2="368" y2="425" marker-end="url(#ah)"/>
    <line x1="670" y1="425" x2="728" y2="425" marker-end="url(#ah)"/>
  </g>

  <!-- compounding return arc (left margin) -->
  <path d="M60,425 H46 a12,12 0 0 1 -12,-12 V164 a12,12 0 0 1 12,-12 H60" fill="none" stroke="#6366F1" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahi)"/>
  <text x="49" y="300" font-size="10.5" fill="#6366F1" text-anchor="middle" transform="rotate(-90 49,300)">each finished piece feeds the next · the work compounds</text>

  <!-- footnote -->
  <text x="730" y="486" font-size="10.5" fill="#9CA3AF" text-anchor="middle">Phase 5 writes the draft. Phase 6 only runs if you configured profile/publish.md.</text>
</svg>
